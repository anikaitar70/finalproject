# Rate limit zone for Cred Rank Net only.
# Install WITHOUT modifying existing site configs:
#
#   sudo cp deploy/nginx/credranknet-limit.conf /etc/nginx/conf.d/credranknet-limit.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# This file is namespaced (credranknet_*) and does not alter other zones.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

limit_req_zone $binary_remote_addr zone=credranknet_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=credranknet_general:10m rate=10r/s;
