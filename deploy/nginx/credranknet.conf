# Cred Rank Net — dedicated Nginx server block
#
# DOES NOT modify existing sites. Install as a new site only:
#
#   sudo cp deploy/nginx/credranknet-limit.conf /etc/nginx/conf.d/credranknet-limit.conf
#   sudo cp deploy/nginx/credranknet.conf /etc/nginx/sites-available/credranknet.conf
#   sudo ln -s /etc/nginx/sites-available/credranknet.conf /etc/nginx/sites-enabled/credranknet.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace credranknet.yourdomain.com with your domain before enabling SSL.
# After certbot, this file is updated with a 443 server block automatically.

upstream credranknet_upstream {
    server 127.0.0.1:3010;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name credranknet.yourdomain.com;

    client_max_body_size 25m;

    access_log /var/log/nginx/credranknet.access.log;
    error_log /var/log/nginx/credranknet.error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # NextAuth OAuth callbacks — no rate limit, full proxy headers
    location /api/auth/ {
        proxy_pass http://credranknet_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;

        proxy_buffering off;
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }

    # UploadThing — larger body, longer timeout
    location /api/uploadthing {
        client_max_body_size 25m;

        proxy_pass http://credranknet_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 15s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
    }

    location /api/health {
        access_log off;
        proxy_pass http://credranknet_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }

    location /api/ {
        limit_req zone=credranknet_api burst=50 nodelay;

        proxy_pass http://credranknet_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }

    location / {
        limit_req zone=credranknet_general burst=30 nodelay;

        proxy_pass http://credranknet_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
